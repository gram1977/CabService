version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd frontend
            - npm ci
        build:
          commands:
            - cd frontend
            - npm run build
      artifacts:
        baseDirectory: frontend/build
        files:
          - "**/*"
      cache:
        paths:
          - frontend/node_modules/**/*
  env:
    variables:
      REACT_APP_API_URL: http://your-ec2-public-ip:PORT